trigger:
  branches:
    include:
      - main
  paths:
    include:
      - bicep/**
      - pipelines/azure-pipelines.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - bicep/**

variables:
  bicepPath: $(Build.SourcesDirectory)/bicep
  parametersPath: $(Build.SourcesDirectory)/bicep/parameters
  templateFile: $(bicepPath)/main.bicep

stages:
  - stage: Validate
    displayName: Validate and Lint
    jobs:
      - job: ValidateBicep
        displayName: Validate Bicep Templates
        pool: Self-Hosted-Dan
          # vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 0

          - task: AzureCLI@2
            displayName: Install Bicep CLI
            inputs:
              azureSubscription: dev-conn  # Use any service connection for CLI setup
              scriptType: ps
              scriptLocation: inlineScript
              inlineScript: |
                az bicep upgrade
                az bicep version

          - task: AzureCLI@2
            displayName: Lint Bicep Files
            inputs:
              azureSubscription: dev-conn
              scriptType: ps
              scriptLocation: inlineScript
              inlineScript: |
                $ErrorActionPreference = 'Stop'
                Write-Host "Linting main.bicep..."
                az bicep lint --file $(templateFile)

                Write-Host "Linting modules..."
                Get-ChildItem "$(bicepPath)/modules" -Filter '*.bicep' | ForEach-Object {
                  Write-Host "Linting $($_.FullName)..."
                  az bicep lint --file "$($_.FullName)"
                }

          - task: AzureCLI@2
            displayName: Validate Bicep Parameters
            inputs:
              azureSubscription: dev-conn
              scriptType: ps
              scriptLocation: inlineScript
              inlineScript: |
                $ErrorActionPreference = 'Stop'
                Write-Host "Validating bicepparam files..."
                Get-ChildItem "$(parametersPath)" -Filter '*.bicepparam' | ForEach-Object {
                  Write-Host "Validating $($_.FullName)..."
                  az bicep build-params --file "$($_.FullName)" --outdir "$env:TEMP\bicep-validation"
                }

  - stage: Dev
    displayName: Deploy to Dev
    dependsOn: Validate
    condition: succeeded()
    variables:
      # - group: dev-deployment-vars
      - name: environment
        value: dev
      - name: resourceGroupName
        value: munich-kv-dev
      - name: parametersFile
        value: $(parametersPath)/dev.bicepparam
    jobs:
      - job: WhatIfDev
        displayName: What-If Analysis - Dev
        pool: Self-Hosted-Dan
          # vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Build and What-If - Dev
            inputs:
              azureSubscription: dev-conn
              scriptType: ps
              scriptLocation: inlineScript
              inlineScript: |
                $ErrorActionPreference = 'Stop'

                Write-Host "Running What-If analysis..."
                az deployment group what-if `
                --resource-group $(resourceGroupName) `
                --template-file $(templateFile) `
                --parameters $(parametersFile) `
                --output table

      - deployment: DeployDev
        pool: Self-Hosted-Dan
        displayName: Deploy to Dev
        dependsOn: WhatIfDev
        condition: succeeded()
        environment: 
          name: dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Deploy to Resource Group
                  inputs:
                    azureSubscription: dev-conn
                    scriptType: ps
                    scriptLocation: inlineScript
                    inlineScript: |
                      $ErrorActionPreference = 'Stop'
                      Write-Host "Deploying Bicep template to $(resourceGroupName)..."
                      az deployment group create `
                      --resource-group $(resourceGroupName) `
                      --template-file $(templateFile) `
                      --parameters $(parametersFile) `
                      --name "bicep-deployment-$(Build.BuildId)" `
                      --output table

  - stage: Test
    displayName: Deploy to Test
    dependsOn: Dev
    condition: succeeded()
    variables:
      #- group: test-deployment-vars
      - name: environment
        value: test
      - name: resourceGroupName
        value: munich-kv-test
      - name: parametersFile
        value: $(parametersPath)/test.bicepparam
    jobs:
      - job: WhatIfTest
        displayName: What-If Analysis - Test
        pool: Self-Hosted-Dan
          # vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Build and What-If - Test
            inputs:
              azureSubscription: test-con
              scriptType: ps
              scriptLocation: inlineScript
              inlineScript: |
                $ErrorActionPreference = 'Stop'
                Write-Host "Running What-If analysis..."
                az deployment group what-if --resource-group $(resourceGroupName) --template-file $(templateFile) --parameters $(parametersFile) --output table

      - deployment: DeployTest
        displayName: Deploy to Test
        dependsOn: WhatIfTest
        condition: succeeded()
        environment:
          name: test
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Build Bicep Template
                  inputs:
                    azureSubscription: test-con
                    scriptType: ps
                    scriptLocation: inlineScript
                    inlineScript: |
                      $ErrorActionPreference = 'Stop'
                      Write-Host "Building Bicep template..."
                      az bicep build-params --file $(parametersFile) --outdir $(Pipeline.Workspace)

                - task: AzureCLI@2
                  displayName: Deploy to Resource Group
                  inputs:
                    azureSubscription: test-con
                    scriptType: ps
                    scriptLocation: inlineScript
                    inlineScript: |
                      $ErrorActionPreference = 'Stop'
                      Write-Host "Deploying Bicep template to $(resourceGroupName)..."
                      az deployment group create --resource-group $(resourceGroupName) --template-file $(templateFile) --parameters $(parametersFile) --name "bicep-deployment-$(Build.BuildId)" --output table

  - stage: Prod
    displayName: Deploy to Production
    dependsOn: Test
    condition: succeeded()
    variables:
      # - group: prod-deployment-vars
      - name: environment
        value: prod
      - name: resourceGroupName
        value: munich-kv-prod
      - name: parametersFile
        value: $(parametersPath)/prod.bicepparam
    jobs:
      - job: WhatIfProd
        displayName: What-If Analysis - Prod
        pool: Self-Hosted-Dan
          # vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Build and What-If - Prod
            inputs:
              azureSubscription: prod-conn
              scriptType: ps
              scriptLocation: inlineScript
              inlineScript: |
                $ErrorActionPreference = 'Stop'
                Write-Host "Running What-If analysis..."
                az deployment group what-if --resource-group $(resourceGroupName) --template-file $(templateFile) --parameters $(parametersFile) --output table

      - job: ApproveProdDeployment
        displayName: Approval Gate - Production Deployment
        dependsOn: WhatIfProd
        condition: succeeded()
        pool: server
        steps:
          - task: ManualValidation@0
            displayName: Manual Approval Required
            inputs:
              notifyUsers: 'admin@example.com'
              instructions: 'Please review the What-If analysis in the previous stage and approve production deployment'

      - deployment: DeployProd
        displayName: Deploy to Production
        dependsOn: ApproveProdDeployment
        condition: succeeded()
        environment:
          name: prod
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Build Bicep Template
                  inputs:
                    azureSubscription: prod-conn
                    scriptType: ps
                    scriptLocation: inlineScript
                    inlineScript: |
                      $ErrorActionPreference = 'Stop'
                      Write-Host "Building Bicep template..."
                      az bicep build-params --file $(parametersFile) --outdir $(Pipeline.Workspace)

                - task: AzureCLI@2
                  displayName: Deploy to Resource Group
                  inputs:
                    azureSubscription: prod-conn
                    scriptType: ps
                    scriptLocation: inlineScript
                    inlineScript: |
                      $ErrorActionPreference = 'Stop'
                      Write-Host "Deploying Bicep template to $(resourceGroupName)..."
                      az deployment group create --resource-group $(resourceGroupName) --template-file $(templateFile) --parameters $(parametersFile) --name "bicep-deployment-$(Build.BuildId)" --output table
